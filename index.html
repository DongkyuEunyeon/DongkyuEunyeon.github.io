<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동규 & 은연의 결혼식에 초대합니다</title>
    <style>
        /* 기본 스타일 설정 */
        :root {
            --bg-color: #fcfaf8;
            --text-color: #444;
            --accent-color: #b8a291;
            --font-main: 'Pretendard', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        section {
            width: 100%;
            max-width: 450px;
            padding: 60px 20px;
            box-sizing: border-box;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        /* 스크롤 애니메이션 활성화 클래스 */
        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 메인 상단 (Main Visual) */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.1), rgba(255,255,255,0.1)), 
                        url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=800&q=80'); /* 임시 이미지 */
            background-size: cover;
            background-position: center;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .hero h1 { font-weight: 300; font-size: 1.5rem; letter-spacing: 5px; }
        .hero .names { font-size: 2.2rem; margin: 20px 0; }

        /* 초대 문구 (Invitation) */
        .invitation .title {
            color: var(--accent-color);
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .content { line-height: 2; font-size: 0.95rem; }

        /* 캘린더/날짜 부분 */
        .date-box {
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 20px 0;
            margin: 40px 0;
        }

        /* 버튼 스타일 */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 0.85rem;
        }

    </style>
</head>
<body>

    <section class="hero visible">
        <h1>MARRIAGE</h1>
        <div class="names">동규 & 은연</div>
        <p>2026. 10. 10. SAT PM 12:00</p>
    </section>

    <section class="invitation">
        <p class="title">INVITATION</p>
        <div class="content">
            무엇보다도 서로 깊이 사랑하십시오.<br>
            사랑은 허다한 죄를 덮습니다.<br>
            베드로전서 4:8<br><br>
            이 말씀 위에<br>
			사랑으로 서로를 덮는 작은 교회,<br>
			한 가정을 세워가려 합니다.<br>
			귀한 걸음으로 함께 축복해 주세요<br>
        </div>
        <div class="date-box">
            <p><strong>2026년 10월 10일</strong></p>
            <p>토요일 오후 12시 00분</p>
            <p>삼일교회 B관</p>
        </div>
		<a href="navermap://naver.me/5MVzsKZ1" 
		   target="_blank" 
		   class="btn">
		   네이버 지도
		</a>
		<a href="kakaomap://kko.to/K1huGLRr2R" 
		   target="_blank" 
		   class="btn">
		   카카오맵
		</a>
        <a href="https://www.google.com/maps/search/?api=1&query=삼일교회+B관" 
		   target="_blank" 
		   class="btn">
		   구글 맵스
		</a>
    </section>

    <section class="gallery">
        <p class="title">GALLERY</p>
		<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
			<img src="./images/1.jpg" style="width:100%; border-radius:8px;" alt="웨딩 사진 1">
			<img src="./images/2.jpg" style="width:100%; border-radius:8px;" alt="웨딩 사진 2">
			<img src="./images/3.jpg" style="width:100%; border-radius:8px;" alt="웨딩 사진 3">
			<img src="./images/4.jpg" style="width:100%; border-radius:8px;" alt="웨딩 사진 4">
		</div>
    </section>
	<div style="
	    position: fixed;
	    bottom: 20px; /* 화면 맨 아래에서 살짝 띄워서 답답하지 않게 함 */
	    left: 0;
	    width: 100%;
	    background-color: transparent; /* 배경색 투명 */
	    color: #888; /* 글씨 색상 (원하시면 더 진하게 가능) */
	    text-align: center;
	    padding: 0; /* 박스 여백 없음 */
	    font-size: 0.8rem; /* 글씨 크기 (살짝 작게) */
	    letter-spacing: 1px; /* 글자 간격 */
	    z-index: 9999; /* 다른 요소보다 위에 보이게 */
	    border: none; /* 테두리 없음 */
	    pointer-events: none; /* 클릭 안 되게 (뒤에 내용 클릭 방지) */
	    text-shadow: 0 1px 2px rgba(255,255,255,0.8); /* 흰색 그림자를 살짝 줘서 배경과 겹쳐도 글씨가 잘 보이게 함 */
	">
	    동규 ♥ 은연 all rights reserved
	</div>

    <script>
        // 스크롤 시 섹션이 나타나는 간단한 자바스크립트
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('section').forEach(section => {
            observer.observe(section);
        });
    </script>
</body>

</html>
